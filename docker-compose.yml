version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: toolmgmt-db
    environment:
      POSTGRES_DB:       toolmanagement
      POSTGRES_USER:     tooluser
      POSTGRES_PASSWORD: toolpassword
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tooluser -d toolmanagement"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: toolmgmt-api
    environment:
      DB_HOST:           postgres
      DB_PORT:           5432
      DB_NAME:           toolmanagement
      DB_USER:           tooluser
      DB_PASSWORD:       toolpassword
      JWT_SECRET:        change_this_to_a_strong_secret_key_in_prod
      JWT_EXPIRES_IN:    7d
      PORT:              5000
      NODE_ENV:          production
      CORS_ORIGIN:       http://localhost:3000
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      UPLOAD_DIR:        /app/uploads
    volumes:
      - uploads:/app/uploads
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: http://localhost:5000/api
    container_name: toolmgmt-web
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
